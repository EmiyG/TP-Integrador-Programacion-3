<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.classless.min.css" type="text/css">
    <link rel="stylesheet" href="styles.css">
    <title>Consulta de Productos</title>
</head>

<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Consultar todos</a></li>
                <li><a href="consultar.html">Consultar por ID</a></li>
                <li><a href="crear.html">Crear</a></li>
                <li><a href="modificar.html">Modificar</a></li>
                <li><a href="eliminar.html">Eliminar</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <h1>Listado de Productos</h1>
        <p>A continuación se muestran todos los productos obtenidos del backend.</p>

        <section id="section-products" class="grid"></section>

    </main>
</body>
<script>
    const sectionProductos = document.getElementById("section-products");
    // **IMPORTANTE:** Ajusta el puerto (3000) si tu Backend (Express) usa otro (como 3500)
    const BASE_URL = "http://localhost:3000"; 

    /**
     * @function obtenerProductos
     * Realiza una petición GET al backend para obtener la lista de productos.
     */
    async function obtenerProductos() {
        try {
            // Petición al endpoint /productos
            let response = await fetch(`${BASE_URL}/productos`);

            if (!response.ok) {
                throw new Error(`Error en la respuesta de la red: ${response.status}`);
            }

            let data = await response.json();
            let productos = data.payload || data; // Adaptable si el payload viene directo o encapsulado
            
            console.table(productos);
            mostrarProductos(productos);

        } catch (error) {
            console.error("Error al obtener productos:", error);
            // Muestra un mensaje de error al usuario
            sectionProductos.innerHTML = `<p style="color: red;">Error al conectar con la API o al obtener los datos. Asegúrate de que el backend esté corriendo en ${BASE_URL}.</p>`;
        }
    }

    /**
     * @function mostrarProductos
     * Renderiza las tarjetas de productos en el DOM.
     * @param {Array<Object>} array - Lista de objetos producto.
     */
    function mostrarProductos(array) {
        if (!array || array.length === 0) {
            sectionProductos.innerHTML = "<p>No se encontraron productos.</p>";
            return;
        }

        // Mapea el array de productos a un array de strings HTML
        const htmlProductos = array.map(producto => `
            <article class="card-producto">
                <header>
                    <img class="producto-img" src="${producto.image || 'placeholder.png'}" alt="${producto.name || 'Sin nombre'}" style="width: 100%; height: 200px; object-fit: cover;">
                </header>
                <footer>
                    <h3>${producto.name || 'Producto sin nombre'}</h3>
                    <p><strong>ID:</strong> ${producto.id}</p>
                    <p><strong>Precio:</strong> $${producto.price !== undefined ? producto.price.toFixed(2) : 'N/A'}</p>
                </footer>
            </article>
        `).join(''); // Une los strings en uno solo

        sectionProductos.innerHTML = htmlProductos;
    }

    // Llama a la función principal al cargar la página
    obtenerProductos();
</script>

</html>
